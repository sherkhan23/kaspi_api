server {
    listen 80;
    server_name api.infozem.kz;

    location /static/ {
        alias /static/;  # Указываем путь к смонтированному тому
    }

    location / {
        proxy_pass http://admin:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    server_name api.infozem.kz;

    ssl_certificate /etc/letsencrypt/live/api.infozem.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.infozem.kz/privkey.pem;

    location /static/ {
        alias /static/;  # Указываем путь к смонтированному тому
    }

    location / {
        proxy_pass http://admin:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}